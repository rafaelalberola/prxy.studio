<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>@media(pointer:fine){html,html *{cursor:none!important}}body{opacity:0;transition:opacity .35s ease}
.dot-cursor{position:fixed;top:0;left:0;width:12px;height:12px;border-radius:50%;background:#fff;mix-blend-mode:difference;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .2s cubic-bezier(.25,.1,.25,1),height .2s cubic-bezier(.25,.1,.25,1);opacity:0;visibility:hidden}
.dot-cursor.hover{width:40px;height:40px}
</style>
<script>
(function(){
  if(matchMedia('(pointer:coarse)').matches){return}
  var dot=document.createElement('div');
  dot.className='dot-cursor';
  var sp=sessionStorage.getItem('prxy-cursor');
  var mx=0,my=0,dx=0,dy=0,magTarget=null,hasMoved=false,spaNav=false;
  if(sp){try{var pp=JSON.parse(sp);mx=pp.x;my=pp.y;dx=pp.x;dy=pp.y;dot.style.left=pp.x+'px';dot.style.top=pp.y+'px';dot.style.visibility='visible';dot.style.opacity='1';hasMoved=true}catch(e){}}
  if(!hasMoved)dot.style.opacity='0';
  document.documentElement.appendChild(dot);
  document.addEventListener('mousemove',function(e){if(spaNav)return;mx=e.clientX;my=e.clientY;if(!hasMoved){hasMoved=true;dx=mx;dy=my;dot.style.visibility='visible';dot.style.opacity='1'}sessionStorage.setItem('prxy-cursor',JSON.stringify({x:mx,y:my}))});
  document.addEventListener('mouseleave',function(){dot.style.opacity='0'});
  document.addEventListener('mouseenter',function(){dot.style.opacity='1'});
  function lerp(a,b,t){return a+(b-a)*t}
  (function tick(){
    if(document.body&&!document.body.contains(dot))document.body.appendChild(dot);
    if(!spaNav){
      if(magTarget){try{var r=magTarget.getBoundingClientRect();dx=lerp(dx,r.left+r.width/2,.15);dy=lerp(dy,r.top+r.height/2,.15)}catch(e){magTarget=null}}
      else{dx=lerp(dx,mx,.2);dy=lerp(dy,my,.2)}
    }
    dot.style.left=dx+'px';dot.style.top=dy+'px';
    requestAnimationFrame(tick);
  })();
  var interactives='a,button,.nav-r,.lang-btn,.intro-btn,.more-btn,.sub-btn,.nav-cart';
  document.addEventListener('mouseover',function(e){
    if(location.pathname.indexOf('/shop')===0)return;
    var t=e.target.closest(interactives);
    if(t){dot.classList.add('hover');magTarget=t}
  });
  document.addEventListener('mouseout',function(e){
    if(location.pathname.indexOf('/shop')===0)return;
    var t=e.target.closest(interactives);
    if(!t)return;
    var rel=e.relatedTarget;
    if(rel&&rel.closest&&rel.closest(interactives))return;
    dot.classList.remove('hover');magTarget=null;
  });

  function spaNavigate(url,push){
    spaNav=true;
    if(hasMoved)sessionStorage.setItem('prxy-cursor',JSON.stringify({x:mx,y:my}));
    magTarget=null;dot.classList.remove('hover');
    document.body.style.opacity='0';var ld=document.getElementById('prxyLoader');if(ld){ld.classList.remove('out');ld.style.display='flex'}
    setTimeout(function(){
      fetch(url).then(function(r){return r.text()}).then(function(html){
        var dp=new DOMParser();
        var doc=dp.parseFromString(html,'text/html');
        document.title=doc.title||'';
        var oldS=document.head.querySelectorAll('style');
        for(var i=1;i<oldS.length;i++)oldS[i].remove();
        var newS=doc.head.querySelectorAll('style');
        for(var i=1;i<newS.length;i++)document.head.appendChild(newS[i]);
        if(dot.parentNode)dot.parentNode.removeChild(dot);
        document.body.innerHTML='';
        var nodes=doc.body.childNodes;
        while(nodes.length){document.body.appendChild(nodes[0])}
        var scripts=Array.from(document.body.querySelectorAll('script'));
        scripts.forEach(function(old){
          var s=document.createElement('script');
          if(old.src)s.src=old.src;
          else s.textContent=old.textContent;
          old.parentNode.replaceChild(s,old);
        });
        document.body.appendChild(dot);dot.style.left=dx+'px';dot.style.top=dy+'px';
        spaNav=false;
        if(push)history.pushState(null,'',url);
        var hash=url.split('#')[1];
        if(hash){var el=document.getElementById(hash);if(el)el.scrollIntoView()}
        else window.scrollTo(0,0);
        requestAnimationFrame(function(){var ld=document.getElementById('prxyLoader');if(ld){ld.classList.add('out');setTimeout(function(){ld.style.display='none'},300)}document.body.style.opacity='1'});
      }).catch(function(){location.href=url});
    },350);
  }

  document.addEventListener('click',function(e){
    var link=e.target.closest('a');
    if(!link)return;
    var href=link.getAttribute('href');
    if(!href||href.startsWith('#')||href.startsWith('mailto:')||href.startsWith('tel:'))return;
    if(link.target==='_blank')return;
    try{var url=new URL(href,location.origin)}catch(e){return}
    if(url.origin!==location.origin)return;
    if(url.href===location.href)return;
    e.preventDefault();
    spaNavigate(url.href,true);
  });
  window.addEventListener('popstate',function(){spaNavigate(location.href,false)});
})();
</script>
<title>PRXY.STUDIO</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
@font-face{font-family:'GT Pressura Mono';src:url('/fonts/gt-pressura/226f58ab113a6d821def90a7d6dc2427.woff2') format('woff2'),url('/fonts/gt-pressura/226f58ab113a6d821def90a7d6dc2427.woff') format('woff'),url('/fonts/gt-pressura/226f58ab113a6d821def90a7d6dc2427.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap}
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#fbfbfb;
  color:#111;
  font:500 15px/1.5 'GT Pressura Mono',monospace;
  -webkit-font-smoothing:antialiased;
  text-transform:uppercase;
  letter-spacing:-0.02em;
}

::selection{background:#111;color:#fff}
a{-webkit-tap-highlight-color:transparent;color:inherit;text-decoration:none}

@keyframes morph{
  0%,100%{border-radius:0;transform:rotate(0deg)}
  25%{border-radius:0;transform:rotate(90deg)}
  50%{border-radius:50%;transform:rotate(180deg) scale(.7)}
  75%{border-radius:50%;transform:rotate(270deg) scale(.7)}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.prxy-loader{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;
  background:#fbfbfb;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .3s ease;
}
.prxy-loader.out{opacity:0;pointer-events:none}
.prxy-loader-dot{
  width:12px;height:12px;
  background:#FF4D2A;
  animation:morph 4s ease-in-out infinite;
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;justify-content:space-between;align-items:center;
  padding:40px;
  background:rgba(251,251,251,.5);
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
}
.nav-top{display:flex;justify-content:space-between;align-items:center;width:100%}
.nav-acts{display:flex;gap:24px;align-items:center;height:24px}
.logo{letter-spacing:0;font-size:15px}
.nav-cart{position:relative;display:flex;align-items:center;height:24px;transition:opacity .2s}
.nav-cart svg{display:block;opacity:.35;transition:opacity .2s}
.nav-cart:hover svg{opacity:1}
.cart-badge{position:absolute;top:-6px;right:-8px;background:#FF4D2A;color:#fff;font-size:9px;min-width:14px;height:14px;border-radius:50%;display:none;align-items:center;justify-content:center;line-height:1;letter-spacing:0}
.cart-badge.show{display:flex}
.cursor{
  display:inline-block;
  width:10px;height:10px;
  background:#FF4D2A;
  margin-left:6px;
  vertical-align:middle;
  margin-bottom:2px;
  animation:morph 4s ease-in-out infinite;
}
.nav-lang-wrap{display:flex;gap:6px;align-items:center;height:24px}
.lang-btn{font-size:15px;letter-spacing:0;line-height:24px;color:#8e8e8e;cursor:pointer;transition:color .2s}
.lang-btn:hover{color:#555}
.lang-btn.on{color:#111}

/* INTRO */
#intro{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:120px 40px;
  text-align:center;
}
.intro-title{
  font-size:15px;
  line-height:1.7;
  letter-spacing:0;
  opacity:0;
  transform:translateY(4px);
  transition:opacity .6s ease,transform .6s ease;
}
.intro-title.v{opacity:1;transform:translateY(0)}
.intro-btn{
  display:inline-block;
  background:#000;color:#fff;border:none;
  font:inherit;text-transform:uppercase;
  font-size:15px;letter-spacing:0;
  cursor:pointer;
  padding:6px 16px;
  border-radius:100px;
  margin-top:60px;
  opacity:0;
  transition:opacity .6s ease;
}
.intro-btn.v{opacity:1}
.intro-btn:hover{opacity:.7}

/* SERIAL */
.serial{
  position:fixed;
  bottom:32px;right:2px;
  font-size:8px;
  letter-spacing:.1em;
  z-index:5;
  writing-mode:vertical-rl;
  color:#8e8e8e;
}

/* MOBILE */
@media(max-width:600px){
  nav{padding:24px 20px}
  #intro{padding:100px 20px}
}


/* CART DRAWER */
.cart-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s ease}
.cart-overlay.open{opacity:1;pointer-events:auto}
.cart-drawer{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:100vw;background:#fbfbfb;z-index:201;transform:translateX(100%);transition:transform .35s cubic-bezier(.25,.1,.25,1);display:flex;flex-direction:column}
.cart-drawer.open{transform:translateX(0)}
.cart-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(0,0,0,.06)}
.cart-title{font-size:15px;letter-spacing:.08em}
.cart-close{cursor:pointer;color:#8e8e8e;transition:color .2s;background:none;border:none;font-size:28px;line-height:1;padding:8px}
.cart-close:hover{color:#111}
.cart-items{flex:1;overflow-y:auto}
.cart-item{display:flex;gap:20px;padding:24px 16px;border-bottom:1px solid rgba(0,0,0,.06)}
.cart-item-img{width:72px;height:72px;object-fit:contain;flex-shrink:0}
.cart-item-info{flex:1;display:flex;flex-direction:column;justify-content:center}
.cart-item-name{font-size:15px;letter-spacing:0;margin-bottom:2px}
.cart-item-size{font-size:15px;letter-spacing:.05em;color:#8e8e8e;margin-bottom:4px}
.cart-item-price{font-size:15px;letter-spacing:0;color:#8e8e8e}
.cart-empty{flex:1;display:flex;flex-direction:column;align-items:center;padding-top:40px;font-size:13px;letter-spacing:.05em;color:#8e8e8e}
.cart-shop-btn{display:block;width:calc(100% - 48px);background:#111;color:#fbfbfb;font:inherit;text-transform:uppercase;font-size:13px;letter-spacing:.08em;padding:24px 0;text-align:center;margin:24px;transition:background .2s;text-decoration:none}
.cart-shop-btn:hover{background:#000}
.cart-footer{padding:24px 16px 40px;border-top:1px solid rgba(0,0,0,.06)}
.cart-total{display:flex;justify-content:space-between;font-size:15px;letter-spacing:.02em;margin-bottom:24px}
.checkout-btn{width:100%;background:#111;color:#fbfbfb;border:none;font:inherit;text-transform:uppercase;font-size:13px;letter-spacing:.08em;padding:18px 0;cursor:pointer;transition:all .2s}
.checkout-btn:hover{background:#000}
.checkout-btn:active{transform:scale(.98)}
@media(max-width:768px){.cart-drawer{width:100vw}}

</style>
</head>
<body>
<script>if(!window.__cg){window.__cg=1;document.addEventListener('mousemove',function(e){if(e.clientX===0&&e.clientY===0){e.stopImmediatePropagation()}},true)}</script>
<div class="prxy-loader" id="prxyLoader"><div class="prxy-loader-dot"></div></div>

<nav>
  <div class="nav-top">
    <a href="/" class="logo">PRXY<span class="cursor"></span></a>
    <div class="nav-acts">

      <div class="nav-lang-wrap">
        <a href="#" class="lang-btn" id="langEN">EN</a>
        <a href="#" class="lang-btn" id="langES">ES</a>
      </div>
    </div>
  </div>
</nav>

<div class="serial">PRXY-001 / REV.A</div>

<!-- ══════ INTRO ══════ -->
<div id="intro">
<div>
<div class="intro-title" id="introTitle" data-es="SI TE PIDO QUE NOMBRES<br>TODO LO QUE AMAS,<br>CUÁNTO TARDAS EN<br>NOMBRARTE A TI MISMO?">IF I ASKED YOU TO NAME<br>EVERYTHING YOU LOVE,<br>HOW LONG UNTIL<br>YOU NAME YOURSELF?</div>
<a href="/vision" class="intro-btn" id="introBtn" data-es="NUESTRA VISIÓN">OUR VISION</a>
</div>
</div>

<!-- CART -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <div class="cart-title" data-es="TU CESTA">YOUR BAG</div>
    <button class="cart-close" id="cartClose">&times;</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty" id="cartEmpty"><span data-es="VACÍA">EMPTY</span><a href="/shop" class="cart-shop-btn" data-es="VER TIENDA">SEE SHOP</a></div>
  </div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="cart-total">
      <span data-es="TOTAL">TOTAL</span>
      <span id="cartTotal">€0</span>
    </div>
    <a href="/shop" class="checkout-btn" data-es="IR A LA TIENDA">GO TO SHOP</a>
  </div>
</div>

<script>
(function(){


  var lang=localStorage.getItem('prxy-lang')||'en';

  function updateLangBtns(){
    var en=document.getElementById('langEN'),es=document.getElementById('langES');
    if(en){en.classList.toggle('on',lang==='en')}
    if(es){es.classList.toggle('on',lang==='es')}
  }

  function setLang(l){
    lang=l;localStorage.setItem('prxy-lang',l);
    document.querySelectorAll('[data-es]').forEach(function(el){
      if(l==='es'){if(!el.getAttribute('data-en'))el.setAttribute('data-en',el.innerHTML);el.innerHTML=el.getAttribute('data-es')}
      else{if(el.getAttribute('data-en'))el.innerHTML=el.getAttribute('data-en')}
    });
    document.documentElement.lang=l;
    updateLangBtns();
  }

  if(lang==='es')setLang('es');
  updateLangBtns();
  document.getElementById('langEN').addEventListener('click',function(e){e.preventDefault();setLang('en')});
  document.getElementById('langES').addEventListener('click',function(e){e.preventDefault();setLang('es')});

  setTimeout(function(){document.getElementById('introTitle').classList.add('v')},300);
  setTimeout(function(){document.getElementById('introBtn').classList.add('v')},1200);
  // ── Cart badge ──
  function updateCartBadge(){
    try{var c=JSON.parse(localStorage.getItem('prxy-cart')||'[]');var n=0;c.forEach(function(i){n+=(i.qty||1)});var b=document.getElementById('cartCount');if(b){b.textContent=n;b.classList.toggle('show',n>0)}}catch(e){}
  }
  updateCartBadge();
  window.addEventListener('storage',function(e){if(e.key==='prxy-cart')updateCartBadge()});

  // ── Cart drawer ──
  function getCart(){try{return JSON.parse(localStorage.getItem('prxy-cart')||'[]')}catch(e){return[]}}
  function renderCartDrawer(){
    var cart=getCart();var items=document.getElementById('cartItems');var empty=document.getElementById('cartEmpty');
    var footer=document.getElementById('cartFooter');var total=document.getElementById('cartTotal');
    if(!items)return;
    items.querySelectorAll('.cart-item').forEach(function(el){el.remove()});
    if(cart.length===0){empty.style.display='flex';footer.style.display='none';return}
    empty.style.display='none';footer.style.display='block';
    var sum=0;
    cart.forEach(function(item){
      sum+=(item.price||0)*(item.qty||1);
      var d=document.createElement('div');d.className='cart-item';
      d.innerHTML='<img class="cart-item-img" src="'+(item.img||'')+'" alt="">'
        +'<div class="cart-item-info"><div class="cart-item-name">'+item.name+'</div>'
        +(item.size?'<div class="cart-item-size">'+item.size+'</div>':'')
        +'<div class="cart-item-price">€'+item.price+'</div></div>';
      items.appendChild(d);
    });
    total.textContent='€'+sum;
  }
  function openCart(){renderCartDrawer();document.getElementById('cartOverlay').classList.add('open');document.getElementById('cartDrawer').classList.add('open');document.body.style.overflow='hidden'}
  function closeCart(){document.getElementById('cartOverlay').classList.remove('open');document.getElementById('cartDrawer').classList.remove('open');document.body.style.overflow=''}
  var _ct=document.getElementById('cartToggle');if(_ct)_ct.addEventListener('click',function(e){e.preventDefault();openCart()});
  document.getElementById('cartOverlay').addEventListener('click',closeCart);
  document.getElementById('cartClose').addEventListener('click',closeCart);


  var ld=document.getElementById('prxyLoader');if(ld){ld.classList.add('out');setTimeout(function(){ld.style.display='none'},300)}document.body.style.opacity='1';
})();
</script>
<script>
setTimeout(function(){
  var sp=sessionStorage.getItem('prxy-cursor');if(!sp)return;
  try{var pp=JSON.parse(sp);
  document.dispatchEvent(new MouseEvent('mousemove',{clientX:pp.x,clientY:pp.y,bubbles:true}));
  var dot=document.querySelector('.dot-cursor');if(!dot)return;
  var n=0;(function f(){dot.style.left=pp.x+'px';dot.style.top=pp.y+'px';if(++n<10)requestAnimationFrame(f)})()
  }catch(e){}
},100);
</script>
</body>
</html>

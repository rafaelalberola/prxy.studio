<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>@media(pointer:fine){html,html *{cursor:none!important}}body{opacity:1}
.dot-cursor{position:fixed;top:0;left:0;width:12px;height:12px;border-radius:50%;background:#fff;mix-blend-mode:difference;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .2s cubic-bezier(.25,.1,.25,1),height .2s cubic-bezier(.25,.1,.25,1),opacity .2s ease}
.dot-cursor.hover{width:40px;height:40px}
</style>
<script>
(function(){
  if(matchMedia('(pointer:coarse)').matches){return}
  var dot=document.createElement('div');
  dot.className='dot-cursor';
  var sp=sessionStorage.getItem('prxy-cursor');
  var mx=0,my=0,dx=0,dy=0,magTarget=null,hasMoved=false;
  if(sp){try{var pp=JSON.parse(sp);mx=pp.x;my=pp.y;dx=pp.x;dy=pp.y;dot.style.left=pp.x+'px';dot.style.top=pp.y+'px';hasMoved=true}catch(e){}}
  if(!hasMoved)dot.style.opacity='0';
  document.documentElement.appendChild(dot);
  document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;if(!hasMoved){hasMoved=true;dx=mx;dy=my;dot.style.opacity='1'}sessionStorage.setItem('prxy-cursor',JSON.stringify({x:mx,y:my}))});
  document.addEventListener('mouseleave',function(){dot.style.opacity='0'});
  document.addEventListener('mouseenter',function(){dot.style.opacity='1'});
  function lerp(a,b,t){return a+(b-a)*t}
  (function tick(){
    if(magTarget){try{var r=magTarget.getBoundingClientRect();dx=lerp(dx,r.left+r.width/2,.15);dy=lerp(dy,r.top+r.height/2,.15)}catch(e){magTarget=null}}
    else{dx=lerp(dx,mx,.2);dy=lerp(dy,my,.2)}
    dot.style.left=dx+'px';dot.style.top=dy+'px';
    requestAnimationFrame(tick);
  })();
  var interactives='a,button,.nav-r,.lang-btn,.intro-btn,.more-btn,.sub-btn,.nav-cart';
  document.addEventListener('mouseover',function(e){
    if(location.pathname.indexOf('/shop')===0)return;
    var t=e.target.closest(interactives);
    if(t){dot.classList.add('hover');magTarget=t}
  });
  document.addEventListener('mouseout',function(e){
    if(location.pathname.indexOf('/shop')===0)return;
    var t=e.target.closest(interactives);
    if(!t)return;
    var rel=e.relatedTarget;
    if(rel&&rel.closest&&rel.closest(interactives))return;
    dot.classList.remove('hover');magTarget=null;
  });

  function spaNavigate(url,push){
    magTarget=null;dot.classList.remove('hover');
    var ld=document.getElementById('prxyLoader');if(ld){ld.classList.remove('out');ld.style.display='flex'}
    setTimeout(function(){
      fetch(url).then(function(r){return r.text()}).then(function(html){
        var dp=new DOMParser();
        var doc=dp.parseFromString(html,'text/html');
        document.title=doc.title||'';
        var oldS=document.head.querySelectorAll('style');
        for(var i=1;i<oldS.length;i++)oldS[i].remove();
        var newS=doc.head.querySelectorAll('style');
        for(var i=1;i<newS.length;i++)document.head.appendChild(newS[i]);
        document.body.innerHTML='';
        var nodes=doc.body.childNodes;
        while(nodes.length){document.body.appendChild(nodes[0])}
        var scripts=Array.from(document.body.querySelectorAll('script'));
        scripts.forEach(function(old){
          var s=document.createElement('script');
          if(old.src)s.src=old.src;
          else s.textContent=old.textContent;
          old.parentNode.replaceChild(s,old);
        });
        if(push)history.pushState(null,'',url);
        var hash=url.split('#')[1];
        if(hash){var el=document.getElementById(hash);if(el)el.scrollIntoView()}
        else window.scrollTo(0,0);
        requestAnimationFrame(function(){var ld=document.getElementById('prxyLoader');if(ld){ld.classList.add('out');setTimeout(function(){ld.style.display='none'},300)}});
      }).catch(function(){location.href=url});
    },350);
  }

  document.addEventListener('click',function(e){
    var link=e.target.closest('a');
    if(!link)return;
    var href=link.getAttribute('href');
    if(!href||href.startsWith('#')||href.startsWith('mailto:')||href.startsWith('tel:'))return;
    if(link.target==='_blank')return;
    try{var url=new URL(href,location.origin)}catch(e){return}
    if(url.origin!==location.origin)return;
    if(url.href===location.href)return;
    e.preventDefault();
    spaNavigate(url.href,true);
  });
  window.addEventListener('popstate',function(){spaNavigate(location.href,false)});
})();
</script>
<title>SHOP — PRXY.STUDIO</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
@font-face{font-family:'GT Pressura Mono';src:url('/fonts/gt-pressura/226f58ab113a6d821def90a7d6dc2427.woff2') format('woff2'),url('/fonts/gt-pressura/226f58ab113a6d821def90a7d6dc2427.woff') format('woff'),url('/fonts/gt-pressura/226f58ab113a6d821def90a7d6dc2427.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap}
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#fbfbfb;
  color:#1a1a1a;
  font:500 15px/1.5 'GT Pressura Mono',monospace;
  -webkit-font-smoothing:antialiased;
  text-transform:uppercase;
  letter-spacing:-0.02em;
  overflow-x:hidden;
}

::selection{background:#1a1a1a;color:#fff}
a{-webkit-tap-highlight-color:transparent;color:inherit;text-decoration:none}

@keyframes morph{
  0%,100%{border-radius:0;transform:rotate(0deg)}
  25%{border-radius:0;transform:rotate(90deg)}
  50%{border-radius:50%;transform:rotate(180deg) scale(.7)}
  75%{border-radius:50%;transform:rotate(270deg) scale(.7)}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.prxy-loader{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;
  background:#fbfbfb;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .3s ease;
}
.prxy-loader.out{opacity:0;pointer-events:none}
.prxy-loader-dot{
  width:12px;height:12px;
  background:#FF4D2A;
  animation:morph 4s ease-in-out infinite;
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;flex-direction:column;
  padding:20px 40px 0;
  background:rgba(251,251,251,.5);
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
}
.nav-top{display:flex;justify-content:space-between;align-items:center;width:100%}
.nav-acts{display:flex;gap:16px;align-items:center}
.nav-links{display:flex;gap:20px;align-items:center;justify-content:center;padding:16px 0 16px}
.logo{letter-spacing:0;font-size:15px;line-height:24px;display:flex;align-items:center}
.cursor{
  display:block;
  width:10px;height:10px;
  background:#FF4D2A;
  margin-left:6px;
  flex-shrink:0;
  animation:morph 4s ease-in-out infinite;
}
.nav-r{font-size:15px;letter-spacing:0;opacity:.25;transition:opacity .2s}
.nav-r:hover{opacity:1}
.nav-r.active{opacity:1}
.nav-cart{position:relative;display:flex;align-items:center;height:24px;transition:opacity .2s}
.nav-cart svg{display:block;opacity:.35;transition:opacity .2s}
.nav-cart:hover svg{opacity:1}
.cart-badge{position:absolute;top:-6px;right:-8px;background:#FF4D2A;color:#fff;font-size:9px;min-width:14px;height:14px;border-radius:50%;display:none;align-items:center;justify-content:center;line-height:1;letter-spacing:0}
.cart-badge.show{display:flex}
.nav-lang-wrap{display:flex;gap:6px;align-items:center}
.lang-btn{font-size:15px;letter-spacing:0;line-height:24px;opacity:.25;cursor:pointer;transition:opacity .2s}
.lang-btn:hover{opacity:.6}
.lang-btn.on{opacity:1}

.serial{position:fixed;bottom:32px;right:2px;font-size:8px;letter-spacing:.1em;opacity:.25;z-index:5;writing-mode:vertical-rl;color:#1a1a1a}

/* ── GALLERY ── */
.gallery{
  max-width:1100px;margin:0 auto;
  padding:200px 40px 120px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:40px;
}
.gallery-item{cursor:pointer;opacity:0;animation:fadeIn .6s ease forwards}
.gallery-img{width:100%;aspect-ratio:1;object-fit:contain;margin-bottom:16px;transition:transform .3s ease}
.gallery-name{font-size:15px;letter-spacing:0;margin-bottom:4px;text-align:center}
.gallery-price{font-size:15px;letter-spacing:0;opacity:.4;text-align:center}

/* ── DETAIL ── */
.detail{display:none}
.detail.active{display:block}

.product-section{
  max-width:1100px;margin:0 auto;
  padding:130px 40px 60px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0 80px;
  opacity:0;animation:fadeIn .6s ease .2s forwards;
}

/* CAROUSEL */
.carousel{position:relative;width:100%;aspect-ratio:1;overflow:hidden;cursor:grab;grid-column:1;grid-row:1/3}
.carousel:active{cursor:grabbing}
.carousel-track{display:flex;height:100%;transition:transform .4s cubic-bezier(.25,.1,.25,1)}
.carousel-slide{min-width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.carousel-slide img{max-width:90%;max-height:90%;object-fit:contain;display:block;user-select:none;-webkit-user-drag:none}
.carousel-slide img.hat-carousel{max-width:55%;max-height:55%}
.carousel-dots{position:absolute;bottom:16px;left:0;right:0;display:flex;justify-content:center;gap:8px}
.carousel-dot{width:6px;height:6px;background:#1a1a1a;opacity:.15;border-radius:50%;cursor:pointer;transition:opacity .2s}
.carousel-dot.active{opacity:.6}
.carousel-nav{position:absolute;top:0;left:0;right:0;bottom:0;display:flex}
.carousel-prev,.carousel-next{flex:1;cursor:pointer}
.carousel-arrow{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;border:1px solid #1a1a1a;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:1;transition:opacity .2s;z-index:2;font-size:15px;color:#1a1a1a;background:#fbfbfb}
.carousel-arrow:hover{opacity:.7}
.carousel-arrow.arr-l{left:12px}
.carousel-arrow.arr-r{right:12px}

/* GALLERY MINI-CAROUSEL */
.gallery-item{cursor:pointer;opacity:0;animation:fadeIn .6s ease forwards;position:relative}
.gallery-carousel{position:relative;width:100%;aspect-ratio:1;overflow:hidden}
.gallery-track{display:flex;height:100%;transition:transform .4s cubic-bezier(.25,.1,.25,1)}
.gallery-slide{min-width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.gallery-slide img{max-width:90%;max-height:90%;object-fit:contain}
.gallery-slide img.hat-img{transform:scale(.55)}
.gallery-arrow{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;border:1px solid #1a1a1a;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .2s;z-index:2;font-size:12px;color:#1a1a1a;background:#fbfbfb}
.gallery-item:hover .gallery-arrow{opacity:1}
.gallery-arrow:hover{opacity:.7!important}
.gallery-arrow.ga-l{left:8px}
.gallery-arrow.ga-r{right:8px}
.gallery-dots-mini{position:absolute;bottom:8px;left:0;right:0;display:flex;justify-content:center;gap:5px}
.gallery-dot-mini{width:4px;height:4px;background:#1a1a1a;opacity:.12;border-radius:50%;transition:opacity .2s}
.gallery-dot-mini.active{opacity:.5}

/* PRODUCT INFO */
.product-info{display:flex;flex-direction:column;justify-content:center;padding:20px 0;grid-column:2}
.p-back{font-size:15px;letter-spacing:.08em;opacity:.25;margin-bottom:24px;display:block;width:fit-content;grid-column:2;transition:opacity .2s;cursor:pointer;padding:8px 0}
.p-back:hover{opacity:1}
.p-name{font-size:15px;letter-spacing:0;margin-bottom:6px;line-height:1.4}
.p-subtitle{font-size:15px;letter-spacing:.08em;opacity:.35;margin-bottom:20px}
.p-price{font-size:15px;letter-spacing:0;margin-bottom:44px}

/* SPECS */
.specs{margin-bottom:40px;border-top:1px solid rgba(0,0,0,.06)}
.spec{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.spec-icon{width:24px;height:24px;flex-shrink:0;opacity:.3}
.spec-icon svg{width:100%;height:100%}
.spec-text{font-size:15px;letter-spacing:.02em;line-height:1.4}

/* SIZE SELECTOR */
.size-section{margin-bottom:32px}
.size-label{font-size:15px;letter-spacing:.08em;opacity:.35;margin-bottom:12px}
.size-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(0,1fr));gap:8px}
.size-btn{
  width:100%;height:40px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(0,0,0,.12);background:transparent;
  font:inherit;text-transform:uppercase;font-size:15px;letter-spacing:0;
  cursor:pointer;transition:all .15s;
}
.size-btn:hover{border-color:#1a1a1a}
.size-btn.active{background:#1a1a1a;color:#fbfbfb;border-color:#1a1a1a}
.size-btn.disabled{opacity:.2;cursor:not-allowed}

/* QUANTITY */
.qty-section{display:flex;align-items:center;justify-content:center;margin-bottom:24px}
.qty-ctrl{display:flex;align-items:center}
.qty-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(0,0,0,.12);background:transparent;font:inherit;font-size:15px;letter-spacing:0;cursor:pointer;transition:all .15s;user-select:none}
.qty-btn:hover{border-color:#1a1a1a}
.qty-btn:active{transform:scale(.95)}
.qty-val{width:48px;height:40px;display:flex;align-items:center;justify-content:center;border-top:1px solid rgba(0,0,0,.12);border-bottom:1px solid rgba(0,0,0,.12);font:inherit;font-size:15px;letter-spacing:0}

/* ADD TO BAG */
.add-btn{
  width:100%;background:#1a1a1a;color:#fbfbfb;border:none;
  font:inherit;text-transform:uppercase;font-size:13px;letter-spacing:.08em;
  padding:18px 0;cursor:pointer;transition:all .2s;
}
.add-btn:hover{background:#333}
.add-btn:active{transform:scale(.98)}
.add-btn.added{background:#fbfbfb;color:#1a1a1a;border:1px solid #1a1a1a}
.add-btn:disabled{opacity:.2;cursor:not-allowed}
.size-hint{font-size:15px;letter-spacing:.05em;opacity:.25;text-align:center;margin-top:12px}

/* ── CART DRAWER ── */
.cart-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s ease}
.cart-overlay.open{opacity:1;pointer-events:auto}
.cart-drawer{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:100vw;background:#fbfbfb;z-index:201;transform:translateX(100%);transition:transform .35s cubic-bezier(.25,.1,.25,1);display:flex;flex-direction:column}
.cart-drawer.open{transform:translateX(0)}
.cart-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(0,0,0,.06)}
.cart-title{font-size:15px;letter-spacing:.08em}
.cart-close{cursor:pointer;opacity:.3;transition:opacity .2s;background:none;border:none;font-size:28px;line-height:1;padding:8px}
.cart-close:hover{opacity:1}
.cart-items{flex:1;overflow-y:auto}
.cart-item{display:flex;gap:20px;padding:24px 16px;border-bottom:1px solid rgba(0,0,0,.06)}
.cart-item-img{width:72px;height:72px;object-fit:contain;flex-shrink:0}
.cart-item-info{flex:1;display:flex;flex-direction:column;justify-content:center}
.cart-item-name{font-size:15px;letter-spacing:0;margin-bottom:2px}
.cart-item-size{font-size:15px;letter-spacing:.05em;opacity:.35;margin-bottom:4px}
.cart-item-price{font-size:15px;letter-spacing:0;opacity:.5}
.cart-item-actions{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.cart-item-actions .qty-ctrl{display:flex;align-items:center}
.cart-item-actions .qty-btn{width:28px;height:28px;font-size:13px}
.cart-item-actions .qty-val{width:32px;height:28px;font-size:13px}
.cart-item-remove{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:none;border:1px solid rgba(0,0,0,.12);cursor:pointer;opacity:.25;transition:opacity .2s}
.cart-item-remove:hover{opacity:1}
.cart-item-remove svg{width:14px;height:14px}
.cart-empty{flex:1;display:flex;align-items:start;justify-content:center;padding-top:40px;font-size:13px;letter-spacing:.05em;opacity:.2}
.cart-footer{padding:24px 16px 40px;border-top:1px solid rgba(0,0,0,.06)}
.cart-total{display:flex;justify-content:space-between;font-size:15px;letter-spacing:.02em;margin-bottom:24px}
.checkout-btn{width:100%;background:#1a1a1a;color:#fbfbfb;border:none;font:inherit;text-transform:uppercase;font-size:13px;letter-spacing:.08em;padding:18px 0;cursor:pointer;transition:all .2s}
.checkout-btn:hover{background:#333}
.checkout-btn:active{transform:scale(.98)}
.checkout-btn:disabled{opacity:.3;cursor:not-allowed}

.loading{text-align:center;padding:200px 40px;font-size:15px;letter-spacing:0;opacity:.2;grid-column:1/-1}
/* SEAL */
.seal-wrap{
  display:flex;justify-content:center;
  padding:120px 40px 0;
}
.seal{width:190px;height:190px}
.seal-text{
  font:500 8.5px/1 'GT Pressura Mono',monospace;
  fill:#1a1a1a;
  letter-spacing:.15em;
  text-transform:uppercase;
}
@keyframes sealMorph{
  0%,100%{rx:0;ry:0;transform:rotate(0deg)}
  25%{rx:0;ry:0;transform:rotate(90deg)}
  50%{rx:6.25px;ry:6.25px;transform:rotate(180deg) scale(.7)}
  75%{rx:6.25px;ry:6.25px;transform:rotate(270deg) scale(.7)}
}
.seal-dot{transform-origin:100px 100px;animation:sealMorph 4s ease-in-out infinite}

footer{text-align:center;padding:60px 40px;font-size:15px;letter-spacing:0;opacity:.2;color:#1a1a1a}

/* TOAST */
.toast{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#f0fdf4;border:1px solid #166534;
  padding:16px 24px;
  display:flex;align-items:center;gap:16px;
  z-index:300;
  opacity:0;pointer-events:none;
  transition:opacity .3s ease,transform .3s ease;
  font:500 15px/1.5 'GT Pressura Mono',monospace;
  text-transform:uppercase;letter-spacing:0;
  color:#166534;
  max-width:90vw;
}
.toast.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.toast-msg{white-space:nowrap}
.toast-btn{
  background:#166534;color:#f0fdf4;border:none;
  font:inherit;text-transform:uppercase;font-size:13px;letter-spacing:.05em;
  padding:8px 16px;cursor:pointer;transition:opacity .2s;white-space:nowrap;
}
.toast-btn:hover{opacity:.8}
.toast-close{background:none;border:none;color:#166534;font-size:20px;line-height:1;cursor:pointer;padding:0 0 0 8px;opacity:.5;transition:opacity .2s}
.toast-close:hover{opacity:1}

@media(max-width:768px){
  nav{padding:20px 20px 0}
  .gallery{padding:80px 20px 80px;gap:30px;grid-template-columns:1fr 1fr}
  .p-back{grid-column:1;text-align:center;width:auto}
  .carousel{grid-column:1;grid-row:auto}
  .product-info{grid-column:1}
  .product-section{grid-template-columns:1fr;gap:40px;padding:130px 20px 60px}
  .cart-drawer{width:100vw}
  footer{padding:80px 20px 40px}
}
@media(max-width:480px){.gallery{grid-template-columns:1fr}.hat-item .gallery-name{margin-top:-60px}.hat-item .gallery-dots-mini{bottom:auto;top:calc(100% - 80px)}}

</style>
</head>
<body>
<div class="prxy-loader" id="prxyLoader"><div class="prxy-loader-dot"></div></div>

<nav>
  <div class="nav-top">
    <a href="/" class="logo">PRXY<span class="cursor"></span></a>
    <div class="nav-acts">
      <a href="#" class="nav-cart" id="cartToggle">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-badge" id="cartCount">0</span>
      </a>
      <div class="nav-lang-wrap">
        <a href="#" class="lang-btn" id="langEN">EN</a>
        <a href="#" class="lang-btn" id="langES">ES</a>
      </div>
    </div>
  </div>
  <div class="nav-links">
    <a href="/manifesto" class="nav-r" data-es="VISIÓN">VISION</a>
    <a href="/process" class="nav-r" data-es="PROCESO">PROCESS</a>
    <a href="/services" class="nav-r" data-es="SERVICIOS">SERVICES</a>
    <a href="/shop" class="nav-r active" data-es="TIENDA">SHOP</a>
  </div>
</nav>

<div class="serial">SHOP-001 / REV.A</div>

<div id="galleryView" class="gallery">
  <div class="loading" data-es="CARGANDO...">LOADING...</div>
</div>

<div id="detailView" class="detail"></div>

<!-- CART -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <div class="cart-title" data-es="TU CESTA">YOUR BAG</div>
    <button class="cart-close" id="cartClose">&times;</button>
  </div>
  <div class="cart-items" id="cartItems">

  function openCart(){document.getElementById('cartOverlay').classList.add('open');document.getElementById('cartDrawer').classList.add('open');document.body.style.overflow='hidden'}

  // ── Carousel ──
  function initCarousel(el){
    var track=el.querySelector('.carousel-track'),dots=el.querySelectorAll('.carousel-dot'),slides=el.querySelectorAll('.carousel-slide');
    var cur=0,tot=slides.length,sx=0,dx=0,drag=false;
    function go(i){cur=Math.max(0,Math.min(i,tot-1));track.style.transform='translateX(-'+cur*100+'%)';dots.forEach(function(d,j){d.classList.toggle('active',j===cur)})}
    el.querySelector('.carousel-prev').addEventListener('click',function(){go(cur-1)});
    el.querySelector('.carousel-next').addEventListener('click',function(){go(cur+1)});
    var arrL=el.querySelector('.arr-l'),arrR=el.querySelector('.arr-r');
    if(arrL)arrL.addEventListener('click',function(e){e.stopPropagation();go(cur-1)});
    if(arrR)arrR.addEventListener('click',function(e){e.stopPropagation();go(cur+1)});
    dots.forEach(function(d,j){d.addEventListener('click',function(){go(j)})});
    el.addEventListener('mousedown',function(e){sx=e.clientX;drag=true});
    el.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;drag=true},{passive:true});
    el.addEventListener('mousemove',function(e){if(drag)dx=e.clientX-sx});
    el.addEventListener('touchmove',function(e){if(drag)dx=e.touches[0].clientX-sx},{passive:true});
    function end(){if(!drag)return;drag=false;if(dx>50)go(cur-1);else if(dx<-50)go(cur+1);dx=0}
    el.addEventListener('mouseup',end);el.addEventListener('mouseleave',end);el.addEventListener('touchend',end);
    go(0);
  }

        '</div>'+

        '<div class="gallery-price">€'+p.price+'</div>';
      item.querySelector('.gallery-name').addEventListener('click',function(){location.hash='product/'+pid});
      item.querySelector('.gallery-price').addEventListener('click',function(){location.hash='product/'+pid});
      // Mini carousel logic
      (function(el,total){
        var cur=0,sx=0,dx=0,drag=false,moved=false;
        var track=el.querySelector('.gallery-track');
        var mdots=el.querySelectorAll('.gallery-dot-mini');
        function go(n){cur=Math.max(0,Math.min(n,total-1));track.style.transition='transform .35s cubic-bezier(.25,.1,.25,1)';track.style.transform='translateX(-'+cur*100+'%)';mdots.forEach(function(d,k){d.classList.toggle('active',k===cur)})}
        el.querySelector('.ga-l').addEventListener('click',function(e){e.stopPropagation();go(cur-1)});
        el.querySelector('.ga-r').addEventListener('click',function(e){e.stopPropagation();go(cur+1)});
        el.addEventListener('mousedown',function(e){sx=e.clientX;dx=0;drag=true;moved=false;track.style.transition='none'});
        el.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;dx=0;drag=true;moved=false;track.style.transition='none'},{passive:true});
        el.addEventListener('mousemove',function(e){if(!drag)return;dx=e.clientX-sx;if(Math.abs(dx)>5)moved=true;var pct=-cur*100+dx/el.offsetWidth*100;track.style.transform='translateX('+pct+'%)'});
        el.addEventListener('touchmove',function(e){if(!drag)return;dx=e.touches[0].clientX-sx;if(Math.abs(dx)>5)moved=true;var pct=-cur*100+dx/el.offsetWidth*100;track.style.transform='translateX('+pct+'%)'},{passive:true});
        function end(){if(!drag)return;drag=false;if(dx>40)go(cur-1);else if(dx<-40)go(cur+1);else go(cur);dx=0}
        el.addEventListener('mouseup',end);el.addEventListener('mouseleave',end);el.addEventListener('touchend',end);
        el.addEventListener('click',function(e){if(moved||e.target.closest('.gallery-arrow'))return;location.hash='product/'+el.getAttribute('data-pid')});
      })(item.querySelector('.gallery-carousel'),p.images.length);
      grid.appendChild(item);
    });

      '</div>';

    initCarousel(document.getElementById('carousel'));

    var selectedSize=p.sizes.length===1?p.sizes[0]:null;
    var qty=1;
    var addBtn=document.getElementById('addBtn');
    var qtyVal=document.getElementById('qtyVal');
    var qtyMinus=document.getElementById('qtyMinus');
    var qtyPlus=document.getElementById('qtyPlus');

    qtyMinus.addEventListener('click',function(){if(qty>1){qty--;qtyVal.textContent=qty}});
    qtyPlus.addEventListener('click',function(){if(qty<10){qty++;qtyVal.textContent=qty}});

    if(p.sizes.length===1){
      addBtn.disabled=false;
      addBtn.textContent=lang==='es'?'AÑADIR A LA CESTA':'ADD TO BAG';
    }

    document.querySelectorAll('.size-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        document.querySelectorAll('.size-btn').forEach(function(b){b.classList.remove('active')});
        this.classList.add('active');
        selectedSize=this.getAttribute('data-size');
        addBtn.disabled=false;
        addBtn.textContent=lang==='es'?'AÑADIR A LA CESTA':'ADD TO BAG';
        addBtn.classList.remove('added');
      });
    });

    addBtn.addEventListener('click',function(){
      if(!selectedSize)return;
      var variantId=null;
      if(VARIANT_MAP[pid]&&VARIANT_MAP[pid][selectedSize]){
        variantId=VARIANT_MAP[pid][selectedSize];
      }
      // If already in cart with same size, increment quantity
      var existing=null;
      for(var ci=0;ci<cart.length;ci++){if(cart[ci].productId==pid&&cart[ci].size===selectedSize){existing=cart[ci];break}}
      if(existing){
        existing.qty=(existing.qty||1)+qty;
        if(existing.qty>10)existing.qty=10;
      }else{
        cart.push({productId:pid,variantId:variantId,name:(typeof p.name==='object'?p.name[lang]:p.name),size:selectedSize,price:p.price,img:p.images[0],qty:qty});
      }
      updateCartUI();
      addBtn.classList.add('added');
      addBtn.textContent=lang==='es'?'AÑADIDO':'ADDED';
      showToast(lang==='es'?'AÑADIDO A LA CESTA':'ADDED TO BAG');
    });

    window.scrollTo(0,0);
  }


  // ── Toast ──
  var toastTimer=null;
  function showToast(msg){
    var t=document.getElementById('toast');
    var m=document.getElementById('toastMsg');
    var b=document.getElementById('toastBtn');
    m.textContent=msg;
    b.textContent=lang==='es'?'VER CESTA':'VIEW BAG';
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(function(){t.classList.remove('show')},4000);
  }
  document.getElementById('toastBtn').addEventListener('click',function(){
    document.getElementById('toast').classList.remove('show');
    clearTimeout(toastTimer);
    openCart();
  });
  document.getElementById('toastClose').addEventListener('click',function(){
    document.getElementById('toast').classList.remove('show');
    clearTimeout(toastTimer);
  });

  renderGallery();
  updateCartUI();
  route();
  window.addEventListener('hashchange',route);

  // Auto-open cart if linked with #bag
  if(location.hash==='#bag'){location.hash='';openCart()}
  setTimeout(function(){var ld=document.getElementById('prxyLoader');if(ld){ld.classList.add('out');setTimeout(function(){ld.style.display='none'},300)}},800)
})();
</script>
</body>
</html>

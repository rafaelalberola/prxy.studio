<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRXY.STUDIO</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
@font-face{font-family:'GT Pressura Mono';src:url('fonts/gt-pressura/226f58ab113a6d821def90a7d6dc2427.woff2') format('woff2'),url('fonts/gt-pressura/226f58ab113a6d821def90a7d6dc2427.woff') format('woff'),url('fonts/gt-pressura/226f58ab113a6d821def90a7d6dc2427.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap}
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#fff;
  color:#4a4a4a;
  font:500 15px/1.5 'GT Pressura Mono',monospace;
  -webkit-font-smoothing:antialiased;
  text-transform:uppercase;
  letter-spacing:-0.02em;
}

::selection{background:#4a4a4a;color:#fff}
a{color:inherit;text-decoration:none}

@keyframes morph{
  0%,100%{border-radius:0;transform:rotate(0deg)}
  25%{border-radius:0;transform:rotate(90deg)}
  50%{border-radius:50%;transform:rotate(180deg) scale(.7)}
  75%{border-radius:50%;transform:rotate(270deg) scale(.7)}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;justify-content:space-between;align-items:center;
  padding:40px;
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.logo{letter-spacing:0;font-size:15px}
.cursor{
  display:inline-block;
  width:10px;height:10px;
  background:#FF4D2A;
  margin-left:6px;
  vertical-align:middle;
  margin-bottom:2px;
  animation:morph 4s ease-in-out infinite;
}
.nav-lang{font-size:15px;letter-spacing:0;opacity:.25;cursor:pointer;transition:opacity .2s}
.nav-lang:hover{opacity:1}

/* INTRO */
#intro{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:120px 40px;
  text-align:center;
}
.intro-title{
  font-size:15px;
  line-height:1.7;
  letter-spacing:0;
  opacity:0;
  transform:translateY(4px);
  transition:opacity .6s ease,transform .6s ease;
}
.intro-title.v{opacity:1;transform:translateY(0)}
.intro-btn{
  display:inline-block;
  background:#000;color:#fff;border:none;
  font:inherit;text-transform:uppercase;
  font-size:15px;letter-spacing:0;
  cursor:pointer;
  padding:6px 16px;
  border-radius:100px;
  margin-top:60px;
  opacity:0;
  transition:opacity .6s ease;
}
.intro-btn.v{opacity:1}
.intro-btn:hover{opacity:.7}

/* SERIAL */
.serial{
  position:fixed;
  bottom:32px;right:12px;
  font-size:10px;
  letter-spacing:.1em;
  opacity:.25;
  z-index:5;
  writing-mode:vertical-rl;
  color:#4a4a4a;
}

/* MOBILE */
@media(max-width:600px){
  nav{padding:24px 20px}
  #intro{padding:100px 20px}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">PRXY<span class="cursor"></span></a>
  <a href="#" class="nav-lang" id="langToggle">ES</a>
</nav>

<div class="serial">PRXY-001 / REV.A</div>

<!-- ══════ INTRO ══════ -->
<div id="intro">
<div>
<div class="intro-title" id="introTitle" data-es="SI TE PIDO QUE NOMBRES<br>TODO LO QUE AMAS,<br>¿CUÁNTO TARDAS<br>EN NOMBRARTE A TI MISMO?">IF I ASKED YOU TO NAME<br>EVERYTHING YOU LOVE,<br>HOW LONG UNTIL<br>YOU NAME YOURSELF?</div>
<a href="/manifesto" class="intro-btn" id="introBtn" data-es="LEER MANIFIESTO">READ MANIFESTO</a>
</div>
</div>

<script>
(function(){
  function setLang(lang){
    localStorage.setItem('prxy-lang',lang);
    var els=document.querySelectorAll('[data-es]');
    els.forEach(function(el){
      if(lang==='es'){
        if(!el.getAttribute('data-en'))el.setAttribute('data-en',el.innerHTML);
        el.innerHTML=el.getAttribute('data-es');
      }else{
        if(el.getAttribute('data-en'))el.innerHTML=el.getAttribute('data-en');
      }
    });
    var t=document.getElementById('langToggle');
    if(t)t.textContent=lang==='es'?'EN':'ES';
    document.documentElement.lang=lang;
  }

  var lang=localStorage.getItem('prxy-lang')||'en';
  if(lang==='es')setLang('es');

  document.getElementById('langToggle').addEventListener('click',function(e){
    e.preventDefault();
    var c=localStorage.getItem('prxy-lang')||'en';
    setLang(c==='es'?'en':'es');
  });

  setTimeout(function(){
    document.getElementById('introTitle').classList.add('v');
  },300);
  setTimeout(function(){
    document.getElementById('introBtn').classList.add('v');
  },1200);
})();
</script>
</body>
</html>
